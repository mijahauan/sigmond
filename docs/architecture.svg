<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7d8ca0"/>
    </marker>
    <marker id="arrU" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#aab4c0"/>
    </marker>
    <marker id="arrT" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d9772e"/>
    </marker>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="135%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#1f2a44" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="#ffffff"/>

  <!-- Title -->
  <text x="56" y="46" font-size="30" font-weight="700" fill="#1f2a44">HamSCI DASI2 Station — Sigmond Architecture</text>

  <!-- ============ COMMUNITY / SCIENCE NETWORKS (top) ============ -->
  <text x="80" y="74" font-size="13" font-weight="700" letter-spacing="2" fill="#74808e">COMMUNITY &amp; SCIENCE NETWORKS</text>
  <g filter="url(#sh)">
    <g>
      <rect x="80"   y="86" width="268" height="74" rx="10" fill="#eef1f5" stroke="#aab4c0"/>
      <text x="214"  y="122" text-anchor="middle" font-size="16" font-weight="600" fill="#44515f">wsprnet.org</text>
      <text x="214"  y="143" text-anchor="middle" font-size="11.5" fill="#74808e">WSPR spots</text>
    </g>
    <g>
      <rect x="373"  y="86" width="268" height="74" rx="10" fill="#eef1f5" stroke="#aab4c0"/>
      <text x="507"  y="122" text-anchor="middle" font-size="16" font-weight="600" fill="#44515f">wsprdaemon.org</text>
      <text x="507"  y="143" text-anchor="middle" font-size="11.5" fill="#74808e">WSPR + noise</text>
    </g>
    <g>
      <rect x="666"  y="86" width="268" height="74" rx="10" fill="#eef1f5" stroke="#aab4c0"/>
      <text x="800"  y="122" text-anchor="middle" font-size="16" font-weight="600" fill="#44515f">pskreporter.info</text>
      <text x="800"  y="143" text-anchor="middle" font-size="11.5" fill="#74808e">FT8 / FT4</text>
    </g>
    <g>
      <rect x="959"  y="86" width="268" height="74" rx="10" fill="#eef1f5" stroke="#aab4c0"/>
      <text x="1093" y="122" text-anchor="middle" font-size="16" font-weight="600" fill="#44515f">PSWS / HamSCI</text>
      <text x="1093" y="143" text-anchor="middle" font-size="11.5" fill="#74808e">science data</text>
    </g>
    <g>
      <rect x="1252" y="86" width="268" height="74" rx="10" fill="#eef1f5" stroke="#aab4c0"/>
      <text x="1386" y="122" text-anchor="middle" font-size="16" font-weight="600" fill="#44515f">airframes.io</text>
      <text x="1386" y="143" text-anchor="middle" font-size="11.5" fill="#74808e">HFDL</text>
    </g>
  </g>

  <!-- upload fan: shared services -> networks -->
  <g stroke="#aab4c0" stroke-width="1.6" fill="none" marker-end="url(#arrU)">
    <path d="M620,240 L540,162"/>
    <path d="M820,240 L800,162"/>
    <path d="M1180,240 L1120,162"/>
  </g>
  <text x="980" y="205" font-size="11.5" font-style="italic" fill="#9aa6b3">uploads via hs-uploader</text>

  <!-- ================= SIGMOND OVERSIGHT FRAME ================= -->
  <rect x="56" y="178" width="1488" height="640" rx="16" fill="#f5f7fd" stroke="#2c3e8c" stroke-width="2"/>
  <path d="M56,224 V194 Q56,178 72,178 H1528 Q1544,178 1544,194 V224 Z" fill="#2c3e8c"/>
  <text x="80" y="208" font-size="22" font-weight="700" fill="#ffffff">SIGMOND</text>
  <text x="205" y="208" font-size="14" fill="#c7d0f0">— unified install · configuration · lifecycle · CPU-pinning · shared SQLite sink &#160;·&#160; smd</text>
  <text x="1512" y="208" text-anchor="end" font-size="12.5" font-style="italic" fill="#aeb9e6">oversight</text>

  <!-- row labels -->
  <text x="74" y="399" transform="rotate(-90 74 399)" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="2" fill="#0e7c86">CORE CLIENTS</text>
  <text x="74" y="552" transform="rotate(-90 74 552)" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="2" fill="#4a6fa5">ADDITIONAL CLIENTS</text>

  <!-- == shared services strip == -->
  <g filter="url(#sh)">
    <rect x="170"  y="252" width="300" height="44" rx="9" fill="#e7eef0" stroke="#7d97a2"/>
    <text x="320"  y="279" text-anchor="middle" font-size="12.5" fill="#2c4750">Shared libs · ka9q-python · callhash</text>
    <rect x="560"  y="240" width="430" height="66" rx="10" fill="#e7eef0" stroke="#7d97a2"/>
    <text x="775"  y="270" text-anchor="middle" font-size="14.5" font-weight="700" fill="#2c4750">Shared SQLite sink — sink.db</text>
    <text x="775"  y="291" text-anchor="middle" font-size="11.5" fill="#5b7480">spots · noise · science products</text>
    <rect x="1090" y="240" width="408" height="66" rx="10" fill="#e7eef0" stroke="#7d97a2"/>
    <text x="1294" y="270" text-anchor="middle" font-size="14.5" font-weight="700" fill="#2c4750">hs-uploader</text>
    <text x="1294" y="291" text-anchor="middle" font-size="11.5" fill="#5b7480">ships records upstream</text>
  </g>
  <!-- clients -> sink ; sink -> hs-uploader -->
  <g stroke="#7d8ca0" stroke-width="2" fill="none" marker-end="url(#arr)">
    <path d="M700,330 L700,309"/>
    <path d="M860,330 L860,309"/>
    <path d="M990,273 L1085,273"/>
  </g>
  <text x="715" y="324" font-size="11" font-style="italic" fill="#8a98a8">spots · products → sink</text>

  <!-- == CORE CLIENTS row == -->
  <g filter="url(#sh)">
    <!-- hf-timestd -->
    <rect x="170" y="330" width="311" height="138" rx="11" fill="#0e7c86"/>
    <text x="325" y="370" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">hf-timestd</text>
    <text x="325" y="396" text-anchor="middle" font-size="13" fill="#d6f1f1">Timing authority</text>
    <text x="325" y="416" text-anchor="middle" font-size="11.5" fill="#bfe6e6">T-tiers · chrony · authority.json</text>
    <rect x="247" y="430" width="156" height="22" rx="11" fill="#0a5f67"/>
    <text x="325" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#ffe2c4">timing provider</text>
    <!-- wspr-recorder -->
    <rect x="509" y="330" width="311" height="138" rx="11" fill="#0e7c86"/>
    <text x="664" y="372" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">wspr-recorder</text>
    <text x="664" y="400" text-anchor="middle" font-size="13" fill="#d6f1f1">WSPR / FST4W</text>
    <text x="664" y="421" text-anchor="middle" font-size="11.5" fill="#bfe6e6">decode → wsprnet · wsprdaemon</text>
    <!-- psk-recorder -->
    <rect x="848" y="330" width="311" height="138" rx="11" fill="#0e7c86"/>
    <text x="1003" y="372" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">psk-recorder</text>
    <text x="1003" y="400" text-anchor="middle" font-size="13" fill="#d6f1f1">FT8 / FT4</text>
    <text x="1003" y="421" text-anchor="middle" font-size="11.5" fill="#bfe6e6">decode → pskreporter</text>
    <!-- mag-recorder -->
    <rect x="1187" y="330" width="311" height="138" rx="11" fill="#0e7c86"/>
    <text x="1342" y="372" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">mag-recorder</text>
    <text x="1342" y="400" text-anchor="middle" font-size="13" fill="#d6f1f1">Magnetometer</text>
    <text x="1342" y="421" text-anchor="middle" font-size="11.5" fill="#bfe6e6">daily datasets → PSWS</text>
  </g>

  <!-- == ADDITIONAL CLIENTS row == -->
  <g filter="url(#sh)">
    <rect x="170" y="492" width="311" height="120" rx="11" fill="#ffffff" stroke="#4a6fa5" stroke-width="1.6"/>
    <text x="325" y="532" text-anchor="middle" font-size="18" font-weight="700" fill="#243b66">codar-sounder</text>
    <text x="325" y="558" text-anchor="middle" font-size="12.5" fill="#5b6b86">CODAR HF radar</text>
    <text x="325" y="577" text-anchor="middle" font-size="11.5" fill="#7888a3">ocean-surface / ionosphere</text>

    <rect x="509" y="492" width="311" height="120" rx="11" fill="#ffffff" stroke="#4a6fa5" stroke-width="1.6"/>
    <text x="664" y="532" text-anchor="middle" font-size="18" font-weight="700" fill="#243b66">hfdl-recorder</text>
    <text x="664" y="558" text-anchor="middle" font-size="12.5" fill="#5b6b86">HFDL aircraft data</text>
    <text x="664" y="577" text-anchor="middle" font-size="11.5" fill="#7888a3">dumphfdl → airframes.io</text>

    <rect x="848" y="492" width="311" height="120" rx="11" fill="#ffffff" stroke="#4a6fa5" stroke-width="1.6"/>
    <text x="1003" y="532" text-anchor="middle" font-size="18" font-weight="700" fill="#243b66">hf-tec</text>
    <text x="1003" y="558" text-anchor="middle" font-size="12.5" fill="#5b6b86">HF beacon TEC</text>
    <text x="1003" y="577" text-anchor="middle" font-size="11.5" fill="#7888a3">ionospheric sounding</text>

    <rect x="1187" y="492" width="311" height="120" rx="11" fill="#ffffff" stroke="#4a6fa5" stroke-width="1.6"/>
    <text x="1342" y="532" text-anchor="middle" font-size="18" font-weight="700" fill="#243b66">meteor-scatter</text>
    <text x="1342" y="558" text-anchor="middle" font-size="12.5" fill="#5b6b86">Meteor pings</text>
    <text x="1342" y="577" text-anchor="middle" font-size="11.5" fill="#7888a3">jt9 --msk144</text>
  </g>

  <!-- timing-authority bus from hf-timestd -->
  <g stroke="#d9772e" stroke-width="2" stroke-dasharray="7 5" fill="none">
    <path d="M325,468 L325,481 L1430,481"/>
  </g>
  <g stroke="#d9772e" stroke-width="2" stroke-dasharray="7 5" fill="none" marker-end="url(#arrT)">
    <path d="M664,481 L664,470"/>
    <path d="M1003,481 L1003,470"/>
    <path d="M664,481 L664,490"/>
    <path d="M1003,481 L1003,490"/>
    <path d="M1342,481 L1342,490"/>
  </g>
  <text x="690" y="476" font-size="11" font-weight="600" fill="#bd5f1c">timing authority → all RF clients (RTP↔UTC offset · tier)</text>

  <!-- radiod -> clients (RF subscription) -->
  <g stroke="#7d8ca0" stroke-width="2.2" fill="none" marker-end="url(#arr)">
    <path d="M325,642 L325,616"/>
    <path d="M664,642 L664,616"/>
    <path d="M1003,642 L1003,616"/>
    <path d="M1342,642 L1342,616"/>
  </g>

  <!-- == ka9q-radio / radiod strip == -->
  <g filter="url(#sh)">
    <rect x="170" y="642" width="1328" height="84" rx="11" fill="#334a63"/>
  </g>
  <text x="200" y="678" font-size="20" font-weight="700" fill="#ffffff">ka9q-radio · radiod</text>
  <text x="200" y="703" font-size="13" fill="#c2d0e0">per-channel RTP multicast streams — RF clients subscribe via ka9q-python (MultiStream); data destination from ChannelInfo</text>

  <!-- RX888 -> radiod -->
  <g stroke="#7d8ca0" stroke-width="2.4" fill="none" marker-end="url(#arr)">
    <path d="M1180,850 L1180,728"/>
  </g>
  <text x="1192" y="800" font-size="11.5" font-style="italic" fill="#8a98a8">IQ → RTP</text>

  <!-- magnetometer -> mag-recorder (non-RF path, right gutter) -->
  <g stroke="#7d8ca0" stroke-width="2.2" fill="none" marker-end="url(#arr)">
    <path d="M1515,850 L1515,399 L1500,399"/>
  </g>
  <text x="1533" y="650" transform="rotate(-90 1533 650)" text-anchor="middle" font-size="11" fill="#8a98a8">magnetometer feed · USB-I²C · not via radiod</text>

  <!-- ================= DASI2 HARDWARE KIT (bottom) ================= -->
  <text x="80" y="838" font-size="13" font-weight="700" letter-spacing="2" fill="#a4651a">DASI2 HARDWARE KIT</text>

  <!-- feeders -> RX888 (converging) -->
  <g stroke="#7d8ca0" stroke-width="2.2" fill="none" marker-end="url(#arr)">
    <path d="M214,850 L214,824 L1040,824 L1040,849"/>
    <path d="M507,850 L507,834 L1090,834 L1090,849"/>
    <path d="M800,850 L800,844 L1140,844 L1140,849"/>
  </g>

  <g filter="url(#sh)">
    <rect x="80"   y="850" width="268" height="90" rx="10" fill="#fbe9cf" stroke="#d98a2b"/>
    <text x="214"  y="888" text-anchor="middle" font-size="16" font-weight="700" fill="#8a4410">DXE antenna</text>
    <text x="214"  y="911" text-anchor="middle" font-size="11.5" fill="#9a6420">HF receive antenna</text>

    <rect x="373"  y="850" width="268" height="90" rx="10" fill="#fbe9cf" stroke="#d98a2b"/>
    <text x="507"  y="888" text-anchor="middle" font-size="16" font-weight="700" fill="#8a4410">LB-GPSDO</text>
    <text x="507"  y="911" text-anchor="middle" font-size="11.5" fill="#9a6420">10 MHz + PPS reference</text>

    <rect x="666"  y="850" width="268" height="90" rx="10" fill="#fbe9cf" stroke="#d98a2b"/>
    <text x="800"  y="888" text-anchor="middle" font-size="16" font-weight="700" fill="#8a4410">TS-1 injector</text>
    <text x="800"  y="911" text-anchor="middle" font-size="11.5" fill="#9a6420">GPS-disciplined PPS into RX</text>

    <rect x="959"  y="850" width="268" height="90" rx="10" fill="#f6d9a8" stroke="#c47a1c" stroke-width="2"/>
    <text x="1093" y="888" text-anchor="middle" font-size="16" font-weight="700" fill="#7a3a0c">RX888 SDR</text>
    <text x="1093" y="911" text-anchor="middle" font-size="11.5" fill="#8a4f12">16-bit direct-sampling SDR</text>

    <rect x="1252" y="850" width="268" height="90" rx="10" fill="#fbe9cf" stroke="#d98a2b"/>
    <text x="1386" y="888" text-anchor="middle" font-size="16" font-weight="700" fill="#8a4410">Magnetometer</text>
    <text x="1386" y="911" text-anchor="middle" font-size="11.5" fill="#9a6420">PNI RM3100 (USB-I²C)</text>
  </g>

  <!-- ================= LEGEND ================= -->
  <g font-size="12" fill="#44515f">
    <rect x="120" y="958" width="20" height="14" rx="3" fill="#0e7c86"/>
    <text x="148" y="969">Core client</text>
    <rect x="258" y="958" width="20" height="14" rx="3" fill="#ffffff" stroke="#4a6fa5" stroke-width="1.6"/>
    <text x="286" y="969">Additional client</text>
    <rect x="430" y="958" width="20" height="14" rx="3" fill="#334a63"/>
    <text x="458" y="969">ka9q-radio (radiod)</text>
    <rect x="624" y="958" width="20" height="14" rx="3" fill="#fbe9cf" stroke="#d98a2b"/>
    <text x="652" y="969">DASI2 hardware</text>
    <rect x="800" y="958" width="20" height="14" rx="3" fill="#eef1f5" stroke="#aab4c0"/>
    <text x="828" y="969">Community / science network</text>
    <line x1="1040" y1="965" x2="1078" y2="965" stroke="#d9772e" stroke-width="2.4" stroke-dasharray="7 5"/>
    <text x="1086" y="969">timing authority</text>
  </g>
</svg>
