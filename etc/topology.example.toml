# /etc/sigmond/topology.toml
# Sigmond topology registry — edit and copy to /etc/sigmond/topology.toml
#
# Each [component.*] section controls whether smd installs and manages
# that component.  Set enabled = false to skip a component entirely.
#
# Component names should match the catalog (etc/catalog.toml).
# The legacy alias grape (→ hf-timestd) is accepted but deprecated.

[sigmond]
# Where to install smd itself (must be in PATH)
smd_bin = "/usr/local/sbin/smd"

# CPU-affinity policy override (optional).  When unset, sigmond derives
# radiod's CPU pool from the host's physical-core layout (one physical
# core per radiod instance) and gives every other managed service the
# remaining cores.  That heuristic doesn't know about L3 cache islands,
# so on multi-CCX/CCD hosts (Ryzen, Threadripper, EPYC) operators may
# want to align radiod with a whole cache island to keep its FFT
# working set free of decoder-induced L3 pollution.
#
# Set radiod_cpus / other_cpus explicitly to override:
#
# [cpu_affinity]
# radiod_cpus = "0 1 2 3 4 5 6 7"     # e.g. all of CCX0 on a Ryzen 5700U
# other_cpus  = "8 9 10 11 12 13 14 15"
#
# `smd diag cpu-affinity --apply` writes systemd drop-ins reflecting
# this assignment.  See docs/HOST-CAPACITY-PLANNING.md for the broader
# discussion of how workload tiers map onto host topology.

# ── Core station ──────────────────────────────────────────────────────────
# The default DASI2 station: enabled out of the box.  These match the `dasi2`
# catalog profile.  On a host that binds a REMOTE radiod, set ka9q-radio,
# ka9q-web, igmp-querier and gpsdo-monitor to enabled = false (the `client`
# profile) and leave the recorders enabled.

[component.ka9q-radio]
enabled = true
description = "ka9q-radio SDR daemon — receives and multicasts RF channels"
managed = true

[component.ka9q-web]
enabled = true
description = "ka9q-web radiod status web UI"

[component.igmp-querier]
enabled = true
description = "IGMP querier so radiod multicast survives on home-network switches"

[component.gpsdo-monitor]
enabled = true
description = "Leo Bodnar GPSDO health monitor + mDNS advertiser"
# Hardware-gated: installs enabled-but-dormant when no USB GPSDO is attached.

[component.hf-timestd]
enabled = true
description = "HF time-standard analyzer (WWV/WWVH/CHU/BPM) — suite timing authority"
# hf-timestd manages its own systemd units via its own deploy mechanism.
# smd install will verify the service is running but does not install hf-timestd.
managed = false

[component.wspr-recorder]
enabled = true
description = "WSPR/FST4W audio recorder (period-aligned WAVs)"

[component.psk-recorder]
enabled = true
description = "FT4/FT8 spot recorder for PSKReporter"

[component.mag-recorder]
enabled = true
description = "RM3100 magnetometer recorder + PSWS uploader"
# Hardware-gated: installs enabled-but-dormant when no magnetometer is present.

# ── Discretionary clients ───────────────────────────────────────────────────
# Additional HF-science clients, installed at the operator's discretion.  Left
# disabled here so they're advertised but off.  To run one:
#   sudo smd install <name>        # installs AND enables it (flips enabled=true)
#   sudo smd config init <name>
#   sudo smd start <name>
# (Flip enabled=true here by hand only if it's already installed.)

[component.codar-sounder]
enabled = false
description = "Opportunistic ionospheric sounder using CODAR chirp transmissions"

[component.hf-tec]
enabled = false
description = "HF PRN-coded beacon recorder for ionospheric specification (TEC)"

[component.hfdl-recorder]
enabled = false
description = "HFDL recorder — one dumphfdl subprocess per band"

[component.meteor-scatter]
enabled = false
description = "Meteor-scatter ping recorder/decoder (jt9 --msk144)"
