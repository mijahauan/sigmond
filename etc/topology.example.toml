# /etc/sigmond/topology.toml
# Sigmond topology registry — edit and copy to /etc/sigmond/topology.toml
#
# Each [component.*] section controls whether smd installs and manages
# that component.  Set enabled = false to skip a component entirely.
#
# Component names should match the catalog (etc/catalog.toml).
# Legacy aliases (grape, wspr) are accepted but deprecated.

[sigmond]
# Absolute path to the wsprdaemon-client source tree (legacy install path).
wsprdaemon_client = "/home/wsprdaemon/wsprdaemon-client"

# Where to install smd itself (must be in PATH)
smd_bin = "/usr/local/sbin/smd"

[component.ka9q-radio]
enabled = true
description = "ka9q-radio SDR daemon — receives and multicasts RF channels"
managed = true

[component.hf-timestd]
enabled = true
description = "HF time-standard analyzer (WWV/WWVH/CHU/BPM)"
# hf-timestd manages its own systemd units via its own deploy mechanism.
# smd install will verify the service is running but does not install hf-timestd.
managed = false

[component.psk-recorder]
enabled = true
description = "FT4/FT8 spot recorder for PSKReporter"

[component.wspr-recorder]
enabled = false
description = "WSPR/FST4W audio recorder (period-aligned WAVs)"

[component.wsprdaemon-client]
enabled = true
description = "WSPR decoder + poster + uploader (wsprd + jt9 --fst4w)"

[component.ka9q-web]
enabled = true
description = "ka9q-web radiod status web UI"
