# /etc/sigmond/catalog.toml
# Sigmond static catalog of known HamSCI SDR clients and servers.
#
# Small, bounded, and shipped with sigmond.  Answers the question:
# "what clients could be installed on this host?" — independent of
# topology (what IS enabled) and lifecycle (what units resolve to what).
#
# Add a new [client.<name>] section when a new client joins the suite.
# Operators MAY place an override copy at /etc/sigmond/catalog.toml;
# otherwise sigmond reads this file directly from the repo.

[client.ka9q-python]
kind            = "library"
description     = "Python interface for ka9q-radio control and monitoring"
repo            = "https://github.com/mijahauan/ka9q-python"
uses            = []
requires        = []
contract        = ""
install_script  = ""                                  # sigmond installs via editable pip into /opt/sigmond/venv

[client.ka9q-radio]
kind            = "server"
description     = "ka9q-radio SDR daemon — receives and multicasts RF channels"
repo            = "https://github.com/ka9q/ka9q-radio"
uses            = []                                  # ka9q-radio is the thing others use
contract        = ""                                  # not a contract-conformant client
install_script  = ""                                  # built from source via deps.conf
topology_alias  = "radiod"                            # legacy topology.toml name

[client.wspr-recorder]
kind            = "client"
description     = "WSPR/FST4W audio recorder (period-aligned WAVs)"
repo            = "https://github.com/mijahauan/wspr-recorder"
uses            = []
requires        = ["ka9q-python", "ka9q-radio"]
contract        = "0.4"
install_script  = "/opt/git/wspr-recorder/install.sh"

[client.psk-recorder]
kind            = "client"
description     = "FT4/FT8 spot recorder for PSKReporter"
repo            = "https://github.com/mijahauan/psk-recorder"
uses            = []
requires        = ["ka9q-python", "ka9q-radio"]
contract        = "0.4"
install_script  = "/opt/git/psk-recorder/scripts/install.sh"

[client.hf-timestd]
kind            = "client"
description     = "HF time-standard analyzer (WWV/WWVH/CHU/BPM)"
repo            = "https://github.com/mijahauan/hf-timestd"
uses            = []
requires        = ["ka9q-python", "ka9q-radio"]
contract        = "0.4"
install_script  = "/opt/git/hf-timestd/scripts/install.sh"
topology_alias  = "grape"

[client.wsprdaemon-client]
kind            = "client"
description     = "WSPR decoder + poster + uploader (wsprd + jt9 --fst4w)"
repo            = "https://github.com/rrobinett/wsprdaemon-client"
uses            = []
requires        = ["ka9q-python", "ka9q-radio", "wspr-recorder"]
contract        = "0.4"
install_script  = "/opt/git/wsprdaemon-client/install.sh"
topology_alias  = "wspr"

[client.igmp-querier]
kind            = "infra"
description     = "IGMPv2 querier daemon — keeps multicast snoop tables alive on LANs without a router-side querier"
repo            = "https://github.com/mijahauan/igmp-querier"
uses            = []
contract        = ""                                  # not a contract-conformant client
install_script  = "/opt/git/igmp-querier/install.sh"

[client.gpsdo-monitor]
kind            = "infra"
description     = "Leo Bodnar GPSDO health monitor + mDNS advertiser — supplies A-level signal to hf-timestd"
repo            = "https://github.com/mijahauan/gpsdo-monitor"
uses            = []
contract        = ""                                  # infra, not a contract-conformant client
install_script  = "/opt/git/gpsdo-monitor/install.sh"
