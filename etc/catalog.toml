# /etc/sigmond/catalog.toml
# Sigmond catalog of known HamSCI SDR clients and servers.
#
# This is the repo-default catalog layer.  ``load_catalog()`` applies
# three layers in order of increasing precedence:
#
#   1. Discovery from each installed client's ``/opt/git/sigmond/<name>/deploy.toml``
#   2. This file (repo default — ships with sigmond)
#   3. ``/etc/sigmond/catalog.toml`` (per-host operator override, if present)
#
# Each layer is a *sparse overlay*: only the fields explicitly set in a
# block override the same field from earlier layers.  Missing fields
# fall through.  New entries propagate from this file to every host on
# `git pull` — operators no longer need to copy the file into /etc to
# pick up new clients or new sibling deps.
#
# Add a new ``[client.<name>]`` section when a client cannot be auto-
# discovered (e.g. ka9q-radio has no /opt/git/sigmond checkout) or when
# the discovered defaults need a repo-wide override.  Operator-specific
# pins belong in /etc/sigmond/catalog.toml, where you should declare
# *only the fields you want to override* — everything else inherits.

[client.ka9q-radio]
kind            = "server"
description     = "ka9q-radio SDR daemon — receives and multicasts RF channels"
repo            = "https://github.com/ka9q/ka9q-radio"
uses            = []
contract        = ""                                  # not contract-conformant
install_script  = ""                                  # built natively (apt deps + make install)
topology_alias  = "radiod"                            # systemd service name; legacy topology key
start_priority  = 0                                   # always start first

[client.wspr-recorder]
kind            = "client"
description     = "WSPR/FST4W audio recorder (period-aligned WAVs)"
repo            = "https://github.com/mijahauan/wspr-recorder"
uses            = ["ka9q-python"]
requires        = ["ka9q-python", "ka9q-radio"]
contract        = "0.8"
install_script  = "/opt/git/sigmond/wspr-recorder/install.sh"

[client.psk-recorder]
kind            = "client"
description     = "FT4/FT8 spot recorder for PSKReporter"
repo            = "https://github.com/mijahauan/psk-recorder"
uses            = ["ka9q-python"]
requires        = ["ka9q-python", "ka9q-radio"]
contract        = "0.8"
install_script  = "/opt/git/sigmond/psk-recorder/scripts/install.sh"

[client.hf-timestd]
kind            = "client"
description     = "HF time-standard analyzer (WWV/WWVH/CHU/BPM)"
repo            = "https://github.com/mijahauan/hf-timestd"
uses            = ["ka9q-python"]
requires        = ["ka9q-python", "ka9q-radio"]
contract        = "0.8"
install_script  = "/opt/git/sigmond/hf-timestd/scripts/install.sh"
topology_alias  = "grape"

[client.mag-recorder]
kind            = "client"
description     = "RM3100 magnetometer recorder + PSWS uploader (non-radiod, §16 'other')"
repo            = "https://github.com/mijahauan/mag-recorder"
uses            = []
requires        = ["hs-uploader"]                     # sibling pkg for uv editable install
contract        = "0.8"
start_priority  = 200                                 # parallel with decoder chain
# No install_script: install via `smd install mag-recorder` (deploy.toml drives the steps).
# No topology_alias: avoid the deprecated alias surface for a brand-new client.
# The `mag-usb` C binary is bundled inside mag-recorder (bin/mag-usb +
# scripts/build-mag-usb.sh) per sigmond/docs/native-binaries.md — same
# pattern as hfdl-recorder owning dumphfdl — and so is intentionally NOT
# a separate catalog entry.

[client.hs-uploader]
kind            = "library"                           # source-only dep from the catalog's perspective
description     = "HamSCI PSWS uploader (sibling Python pkg used by mag-recorder via uv editable install)"
repo            = "https://github.com/mijahauan/hs-uploader"
# No install_script: mag-recorder's pyproject.toml [tool.uv.sources] points at
# ../hs-uploader as an editable install — only the source tree needs to exist.
# `smd install hs-uploader` still works thanks to find_install_script's post-clone
# discovery (the cloned repo carries its own install.sh).

[client.callhash]
kind            = "library"                           # source-only dep: sibling Python pkg
description     = "WSPR/FST4W callsign-hash resolution library (wspr-recorder + psk-recorder dep)"
repo            = "https://github.com/mijahauan/callhash"
# No install_script: wspr-recorder and psk-recorder declare callhash in their
# pyproject.toml [tool.uv.sources] as `path = "../callhash", editable = true`.
# Sigmond must clone it to /opt/git/sigmond/callhash before invoking either
# recorder's install.sh, otherwise `uv sync` fails with
# `Distribution not found at: file:///opt/git/sigmond/callhash`.  Observed on
# B4-100 greenfield 2026-05-27: wspr-recorder install failed at uv-sync until
# callhash was manually cloned.

[client.hfdl-recorder]
kind            = "client"
description     = "HFDL (High Frequency Data Link) recorder — one dumphfdl subprocess per band"
repo            = "https://github.com/mijahauan/hfdl-recorder"
uses            = ["ka9q-python"]
requires        = ["ka9q-python", "ka9q-radio"]
contract        = "0.8"
install_script  = "/opt/git/sigmond/hfdl-recorder/scripts/install.sh"
# dumphfdl is bundled inside hfdl-recorder (scripts/build-dumphfdl.sh) — same
# owns-its-native-binary pattern as mag-recorder/mag-usb — so it is
# intentionally NOT a separate catalog entry.

[client.codar-sounder]
kind            = "client"
description     = "Opportunistic ionospheric sounder using CODAR chirp transmissions"
repo            = "https://github.com/mijahauan/codar-sounder"
uses            = ["ka9q-python"]
requires        = ["ka9q-python", "ka9q-radio"]
contract        = "0.8"
install_script  = "/opt/git/sigmond/codar-sounder/scripts/install.sh"
start_priority  = 200                                 # parallel with decoder chain
# Lifecycle + coordination passthrough are auto-discovered from the repo's
# own deploy.toml [client] block once cloned.

[client.hf-gps-tec]
kind            = "client"
description     = "HF PRN-coded beacon recorder for ionospheric specification"
repo            = "https://github.com/mijahauan/hf-gps-tec"
uses            = ["ka9q-python"]
requires        = ["ka9q-python", "ka9q-radio"]
contract        = "0.8"
install_script  = "/opt/git/sigmond/hf-gps-tec/scripts/install.sh"

# ---------------------------------------------------------------------------
# Deprecations
#
# Names listed here are excluded from discovery so a stale checkout cannot
# silently re-appear as a normal client.  `smd list` surfaces them in a
# separate "Deprecated (on disk)" section when /opt/git/sigmond/<name>/
# still exists, and `smd remove <name>` becomes a full purge for these
# names (stop+disable units, rm repo, venv, /etc/<name>/).
# ---------------------------------------------------------------------------

[deprecated.wsprdaemon-client]
removed_in  = "0eb8914"
reason      = "Superseded by the ka9q-python-based decoders (wspr-recorder, hf-timestd, psk-recorder)."
replaced_by = ["wspr-recorder"]
# Legacy config lived at /etc/wsprdaemon/ (not /etc/wsprdaemon-client/);
# add it explicitly so the purge gets everything.
extra_paths = ["/etc/wsprdaemon"]
